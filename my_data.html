<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Data - QuickMail</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #006a4e 0%, #f42a41 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        .card {
            background: white;
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 20px;
        }
        .login-box {
            max-width: 400px;
            margin: 100px auto;
            background: white;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
        }
        .login-box input {
            width: 100%;
            padding: 12px;
            margin: 15px 0;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
        }
        .login-box button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #006a4e, #f42a41);
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 16px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #e0e0e0;
        }
        th {
            background: #f8f9fa;
        }
        .dashboard {
            display: none;
        }
        .back-btn {
            background: #f42a41;
            margin-top: 20px;
        }
        .no-data {
            text-align: center;
            padding: 40px;
            color: #666;
        }
    </style>
</head>
<body>
    <div id="loginScreen" class="login-box">
        <h2>📊 My Data</h2>
        <p>Enter your email to see who clicked your emails</p>
        <input type="email" id="userEmail" placeholder="Your email address">
        <button onclick="loadData()">View My Data</button>
    </div>

    <div id="dashboard" class="container">
        <div class="card">
            <h2 style="color:#006a4e; margin-bottom:20px;">📊 My Collected Data</h2>
            <p style="margin-bottom:20px;">People who clicked on links from your emails</p>
            <div style="overflow-x: auto;">
                <table id="dataTable">
                    <thead>
                        <tr>
                            <th>Date & Time</th>
                            <th>Receiver Email</th>
                            <th>IP Address</th>
                            <th>Location</th>
                            <th>Browser</th>
                            <th>Device</th>
                        </thead>
                    <tbody id="tableBody">
                        <tr><td colspan="6" style="text-align:center;">Loading...</td></tr>
                    </tbody>
                </table>
            </div>
            <button onclick="logout()" class="back-btn" style="margin-top:20px; background:#f42a41;">← Back</button>
        </div>
    </div>

    <script>
        let currentEmail = '';
        
        async function loadData() {
            const email = document.getElementById('userEmail').value.trim();
            if (!email) {
                alert('Please enter your email');
                return;
            }
            
            currentEmail = email;
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('dashboard').style.display = 'block';
            document.getElementById('tableBody').innerHTML = '<tr><td colspan="6" style="text-align:center;">Loading data...</td></tr>';
            
            try {
                const response = await fetch('/api/user_data', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: email })
                });
                
                const result = await response.json();
                console.log('Data:', result);
                
                const tbody = document.getElementById('tableBody');
                tbody.innerHTML = '';
                
                if (result.data && result.data.length > 0) {
                    for (const item of result.data) {
                        const row = tbody.insertRow();
                        row.innerHTML = `
                            <td>${new Date(item.timestamp).toLocaleString()}</td>
                            <td>${item.user_email || '-'}</td>
                            <td>${item.ip || '-'}</td>
                            <td>${item.location?.city || '-'}, ${item.location?.country || '-'}</td>
                            <td>${item.browser?.substring(0, 40) || '-'}</td>
                            <td>${item.platform || '-'}</td>
                        `;
                    }
                } else {
                    tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;">📭 No data yet. Send some emails!</td></tr>';
                }
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('tableBody').innerHTML = '<tr><td colspan="6" style="text-align:center;color:red;">❌ Network error. Please try again.</td></tr>';
            }
        }
        
        function logout() {
            document.getElementById('loginScreen').style.display = 'block';
            document.getElementById('dashboard').style.display = 'none';
            document.getElementById('userEmail').value = '';
        }
    </script>
</body>
</html>
