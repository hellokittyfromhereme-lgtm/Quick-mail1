<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Collected Data - QuickMail</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #006a4e 0%, #f42a41 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        .card {
            background: white;
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 20px;
        }
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        .header h1 {
            color: #006a4e;
        }
        .login-box {
            max-width: 400px;
            margin: 100px auto;
            background: white;
            padding: 30px;
            border-radius: 20px;
            text-align: center;
        }
        .login-box input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
        }
        .login-box button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #006a4e, #f42a41);
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #e0e0e0;
        }
        th {
            background: #f8f9fa;
        }
        .badge {
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 12px;
            background: #e8f5e9;
            color: #2e7d32;
        }
        .dashboard {
            display: none;
        }
    </style>
</head>
<body>
    <div id="loginScreen" class="login-box">
        <h2>🔐 Enter Your Email</h2>
        <p style="color:#666; margin-bottom:15px;">Enter the email you use to send emails</p>
        <input type="email" id="userEmail" placeholder="Your email address">
        <button onclick="login()">View My Data</button>
    </div>

    <div id="dashboard" class="container">
        <div class="card">
            <div class="header">
                <h1>📊 My Collected Data</h1>
                <p>People who clicked on your emails</p>
            </div>
            <div style="overflow-x: auto;">
                <table id="dataTable">
                    <thead>
                        <tr>
                            <th>Date</th>
                            <th>Receiver Email</th>
                            <th>IP Address</th>
                            <th>Location</th>
                            <th>Browser</th>
                            <th>Device</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
            <div style="margin-top: 20px; text-align: center;">
                <button onclick="logout()" style="background:#f42a41;">Back</button>
            </div>
        </div>
    </div>

    <script>
        let currentEmail = '';
        
        async function login() {
            const email = document.getElementById('userEmail').value.trim();
            if (!email) {
                alert('Please enter your email');
                return;
            }
            
            currentEmail = email;
            
            const response = await fetch('/api/user_data', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email: email })
            });
            
            const result = await response.json();
            
            if (result.data) {
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('dashboard').style.display = 'block';
                
                const tbody = document.querySelector('#dataTable tbody');
                tbody.innerHTML = '';
                
                for (const item of result.data) {
                    const row = tbody.insertRow();
                    row.innerHTML = `
                        <td>${new Date(item.timestamp).toLocaleString()}</td>
                        <td>${item.user_email || '-'}</td>
                        <td>${item.ip || '-'}</td>
                        <td>${item.location?.city || '-'}, ${item.location?.country || '-'}</td>
                        <td>${item.browser?.substring(0, 40) || '-'}</td>
                        <td>${item.platform || '-'}</td>
                    `;
                }
                
                if (result.data.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;">No data yet. Send some emails!</td></tr>';
                }
            } else {
                alert('No data found for this email');
            }
        }
        
        function logout() {
            document.getElementById('loginScreen').style.display = 'block';
            document.getElementById('dashboard').style.display = 'none';
            document.getElementById('userEmail').value = '';
        }
    </script>
</body>
</html>
