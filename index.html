<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuickMail - Professional Email Designer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #006a4e 0%, #f42a41 100%);
            min-height: 100vh;
            padding: 20px;
            position: relative;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        .card {
            background: white;
            border-radius: 28px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }
        .logo h1 {
            font-size: 36px;
            background: linear-gradient(135deg, #006a4e, #f42a41);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-align: center;
        }
        .badge {
            text-align: center;
            padding: 10px;
            background: #f0f0f0;
            border-radius: 40px;
            margin: 15px 0;
            font-size: 14px;
        }
        .stats-bar {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .stat-item {
            background: linear-gradient(135deg, #006a4e, #f42a41);
            color: white;
            padding: 8px 20px;
            border-radius: 40px;
            font-size: 14px;
        }
        .two-columns {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
        }
        .template-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            margin-top: 15px;
            max-height: 600px;
            overflow-y: auto;
            padding: 5px;
        }
        .template-card {
            border: 2px solid #e0e0e0;
            border-radius: 16px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.3s;
            background: white;
        }
        .template-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            border-color: #006a4e;
        }
        .template-card.selected {
            border-color: #006a4e;
            box-shadow: 0 0 0 3px rgba(0,106,78,0.3);
        }
        .template-card img {
            width: 100%;
            height: 160px;
            object-fit: cover;
        }
        .template-card .info {
            padding: 12px;
        }
        .template-card h4 {
            font-size: 16px;
            margin-bottom: 5px;
        }
        .template-card p {
            font-size: 12px;
            color: #666;
        }
        .field {
            margin-bottom: 18px;
        }
        label {
            display: block;
            margin-bottom: 6px;
            font-weight: 600;
            font-size: 14px;
        }
        input, textarea, select {
            width: 100%;
            padding: 10px 12px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-family: inherit;
            font-size: 14px;
        }
        input:focus, textarea:focus {
            outline: none;
            border-color: #006a4e;
        }
        .variable-group {
            background: #f8f9fa;
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 12px;
        }
        .image-upload {
            border: 2px dashed #006a4e;
            border-radius: 12px;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            background: #f9f9f9;
        }
        .image-upload:hover {
            background: #f0f0f0;
        }
        .preview {
            background: #f5f5f5;
            padding: 20px;
            border-radius: 12px;
            margin-top: 20px;
            max-height: 400px;
            overflow: auto;
            border: 1px solid #e0e0e0;
        }
        button {
            background: linear-gradient(135deg, #006a4e, #f42a41);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: transform 0.2s;
        }
        button:hover {
            transform: scale(1.02);
        }
        /* Admin Icon - Circle Button */
        .admin-icon {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 55px;
            height: 55px;
            background: linear-gradient(135deg, #006a4e, #f42a41);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 5px 20px rgba(0,0,0,0.3);
            transition: all 0.3s;
            z-index: 999;
            color: white;
            font-size: 24px;
        }
        .admin-icon:hover {
            transform: scale(1.1);
        }
        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .modal-content {
            background: white;
            border-radius: 28px;
            padding: 30px;
            width: 350px;
            text-align: center;
        }
        .modal-content input {
            margin: 15px 0;
        }
        .toast {
            position: fixed;
            bottom: 100px;
            right: 30px;
            padding: 12px 24px;
            border-radius: 30px;
            color: white;
            z-index: 1001;
            animation: slideIn 0.3s ease;
        }
        .toast.success { background: #006a4e; }
        .toast.error { background: #f42a41; }
        @keyframes slideIn {
            from { opacity: 0; transform: translateX(100px); }
            to { opacity: 1; transform: translateX(0); }
        }
        .loading {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1002;
            flex-direction: column;
            gap: 15px;
        }
        .spinner {
            width: 45px;
            height: 45px;
            border: 4px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        @media (max-width: 900px) {
            .two-columns { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <!-- Admin Icon (Circle Button) -->
    <div class="admin-icon" onclick="openAdminModal()">
        👤
    </div>

    <!-- Admin Password Modal -->
    <div id="adminModal" class="modal">
        <div class="modal-content">
            <h2 style="color: #006a4e;">🔐 Admin Access</h2>
            <input type="password" id="adminPassword" placeholder="Enter password">
            <button onclick="verifyAdmin()">Login</button>
            <p style="margin-top: 10px; font-size: 12px; color: #888;">Contact admin for password</p>
        </div>
    </div>

    <div class="loading" id="loading">
        <div class="spinner"></div>
        <p style="color:white;">Sending email...</p>
    </div>

    <div class="container">
        <div class="card">
            <div class="logo">
                <h1>📧 QUICKMAIL</h1>
            </div>
            <div class="badge">
                ✨ Made by Hossain | Made in Bangladesh 🇧🇩
            </div>
            
            <!-- Statistics Bar -->
            <div class="stats-bar" id="statsBar">
                <div class="stat-item">📊 Loading stats...</div>
            </div>

            <div class="two-columns">
                <!-- Left: Templates -->
                <div>
                    <h3>🎨 Choose Template</h3>
                    <div id="templateGrid" class="template-grid"></div>
                </div>

                <!-- Right: Form -->
                <div>
                    <div class="field">
                        <label>🔑 License Key *</label>
                        <input type="text" id="license" placeholder="Enter your license key">
                    </div>
                    <div class="field">
                        <label>👤 Your Name *</label>
                        <input type="text" id="name" placeholder="Hossain Mahmud">
                    </div>
                    <div class="field">
                        <label>📧 Your Email *</label>
                        <input type="email" id="from_email" placeholder="you@example.com">
                    </div>
                    <div class="field">
                        <label>🎯 Receiver Email *</label>
                        <input type="email" id="to_email" placeholder="friend@example.com">
                    </div>
                    <div class="field">
                        <label>📌 Subject *</label>
                        <input type="text" id="subject" placeholder="Email subject">
                    </div>
                    
                    <!-- Image Upload for Template -->
                    <div class="field">
                        <label>🖼️ Upload Image (Optional)</label>
                        <div class="image-upload" onclick="document.getElementById('imageInput').click()">
                            📸 Click to upload image from gallery
                            <input type="file" id="imageInput" accept="image/*" style="display: none;" onchange="handleImageUpload(event)">
                        </div>
                        <div id="imagePreview" style="margin-top: 10px; display: none;">
                            <img id="uploadedImage" style="max-width: 100%; border-radius: 12px;">
                            <button type="button" onclick="removeImage()" style="margin-top: 5px; background:#f42a41; padding: 5px;">Remove</button>
                        </div>
                    </div>
                    
                    <div id="variablesContainer"></div>
                    
                    <div class="preview" id="previewArea">
                        <strong>📱 Live Preview</strong>
                        <div id="previewContent">Select a template to see preview</div>
                    </div>
                    
                    <button id="sendBtn">✈️ Send Email</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let templates = {};
        let selectedTemplate = null;
        let variableValues = {};
        let uploadedImageUrl = '';
        
        // Load templates
        async function loadTemplates() {
            try {
                const res = await fetch('/api/templates');
                templates = await res.json();
                renderTemplates();
            } catch(e) {
                console.error('Error loading templates:', e);
            }
        }
        
        function renderTemplates() {
            const grid = document.getElementById('templateGrid');
            grid.innerHTML = '';
            for (const [category, items] of Object.entries(templates)) {
                for (const t of items) {
                    const card = document.createElement('div');
                    card.className = 'template-card';
                    card.onclick = () => selectTemplate(t);
                    card.innerHTML = `
                        <img src="${t.image}" onerror="this.src='https://via.placeholder.com/600x300/006a4e/white?text=Template'">
                        <div class="info">
                            <h4>${t.name}</h4>
                            <p>${t.title}</p>
                            <small style="color:#888;">${category}</small>
                        </div>
                    `;
                    grid.appendChild(card);
                }
            }
        }
        
        function selectTemplate(template) {
            selectedTemplate = template;
            document.querySelectorAll('.template-card').forEach(c => c.classList.remove('selected'));
            if (event && event.target) {
                const card = event.target.closest('.template-card');
                if (card) card.classList.add('selected');
            }
            
            // Generate variable inputs
            const container = document.getElementById('variablesContainer');
            container.innerHTML = '<h3>✏️ Customize Content</h3>';
            variableValues = {};
            
            for (const varName of template.variables) {
                const div = document.createElement('div');
                div.className = 'variable-group';
                div.innerHTML = `
                    <label>${varName.replace(/_/g, ' ')}</label>
                    <input type="text" id="var_${varName}" placeholder="Enter ${varName.replace(/_/g, ' ')}" value="{{${varName}}}">
                `;
                container.appendChild(div);
                variableValues[varName] = `{{${varName}}}`;
                
                const input = div.querySelector('input');
                input.addEventListener('input', (e) => {
                    variableValues[varName] = e.target.value;
                    updatePreview();
                });
            }
            
            updatePreview();
        }
        
        function updatePreview() {
            if (!selectedTemplate) return;
            let html = selectedTemplate.html;
            for (const [key, value] of Object.entries(variableValues)) {
                const regex = new RegExp(`{{${key}}}`, 'g');
                html = html.replace(regex, value);
            }
            // Add uploaded image if exists
            if (uploadedImageUrl && html.includes('{{IMAGE}}')) {
                html = html.replace(/{{IMAGE}}/g, uploadedImageUrl);
            }
            document.getElementById('previewContent').innerHTML = html;
        }
        
        function handleImageUpload(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    uploadedImageUrl = e.target.result;
                    document.getElementById('uploadedImage').src = uploadedImageUrl;
                    document.getElementById('imagePreview').style.display = 'block';
                    updatePreview();
                    showToast('✅ Image uploaded! Use {{IMAGE}} in template', 'success');
                };
                reader.readAsDataURL(file);
            }
        }
        
        function removeImage() {
            uploadedImageUrl = '';
            document.getElementById('imagePreview').style.display = 'none';
            document.getElementById('imageInput').value = '';
            updatePreview();
        }
        
        function showToast(msg, type) {
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.innerText = msg;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 4000);
        }
        
        // Load stats
        async function loadStats() {
            try {
                const res = await fetch('/api/stats');
                const stats = await res.json();
                document.getElementById('statsBar').innerHTML = `
                    <div class="stat-item">🔑 ${stats.totalLicenses || 0} Licenses</div>
                    <div class="stat-item">✅ ${stats.activeLicenses || 0} Active</div>
                    <div class="stat-item">📧 ${stats.totalEmails || 0} Emails Sent</div>
                    <div class="stat-item">👥 ${stats.totalUsers || 0} Users</div>
                `;
            } catch(e) {
                console.error('Stats error:', e);
            }
        }
        
        // Send email
        document.getElementById('sendBtn').addEventListener('click', async () => {
            const license = document.getElementById('license').value.trim();
            const name = document.getElementById('name').value.trim();
            const from_email = document.getElementById('from_email').value.trim();
            const to_email = document.getElementById('to_email').value.trim();
            const subject = document.getElementById('subject').value.trim();
            
            if (!license || !name || !from_email || !to_email || !subject || !selectedTemplate) {
                showToast('❌ Please fill all fields and select a template!', 'error');
                return;
            }
            
            let htmlContent = selectedTemplate.html;
            for (const [key, value] of Object.entries(variableValues)) {
                const regex = new RegExp(`{{${key}}}`, 'g');
                htmlContent = htmlContent.replace(regex, value);
            }
            if (uploadedImageUrl && htmlContent.includes('{{IMAGE}}')) {
                htmlContent = htmlContent.replace(/{{IMAGE}}/g, uploadedImageUrl);
            }
            
            document.getElementById('loading').style.display = 'flex';
            
            try {
                const res = await fetch('/api/send', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ license, name, from_email, to_email, subject, message: htmlContent })
                });
                const result = await res.json();
                document.getElementById('loading').style.display = 'none';
                if (result.success) {
                    showToast(result.message, 'success');
                    loadStats();
                } else {
                    showToast(result.error, 'error');
                }
            } catch (error) {
                document.getElementById('loading').style.display = 'none';
                showToast('Network error!', 'error');
            }
        });
        
        // Admin functions
        function openAdminModal() {
            document.getElementById('adminModal').style.display = 'flex';
        }
        
        function verifyAdmin() {
            const password = document.getElementById('adminPassword').value;
            if (password === '##Hossain##1') {
                document.getElementById('adminModal').style.display = 'none';
                window.location.href = '/admin.html';
            } else {
                showToast('❌ Wrong password!', 'error');
            }
        }
        
        // Close modal when clicking outside
        window.onclick = function(event) {
            const modal = document.getElementById('adminModal');
            if (event.target === modal) {
                modal.style.display = 'none';
            }
        };
        
        // Initialize
        loadTemplates();
        loadStats();
    </script>
</body>
</html>
