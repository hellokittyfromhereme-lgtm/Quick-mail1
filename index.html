<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuickMail - Email Designer</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #006a4e 0%, #f42a41 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        .card {
            background: white;
            border-radius: 28px;
            padding: 30px;
            margin-bottom: 20px;
        }
        .logo h1 {
            font-size: 32px;
            background: linear-gradient(135deg, #006a4e, #f42a41);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-align: center;
        }
        .badge {
            text-align: center;
            padding: 8px;
            background: #f0f0f0;
            border-radius: 30px;
            margin: 15px 0;
        }
        .template-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            margin: 20px 0;
        }
        .template-card {
            border: 2px solid #e0e0e0;
            border-radius: 16px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.3s;
        }
        .template-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            border-color: #006a4e;
        }
        .template-card.selected {
            border-color: #006a4e;
            box-shadow: 0 0 0 3px rgba(0,106,78,0.3);
        }
        .template-card img {
            width: 100%;
            height: 160px;
            object-fit: cover;
        }
        .template-card .info {
            padding: 15px;
        }
        .template-card h4 { margin-bottom: 5px; }
        .template-card p { font-size: 12px; color: #666; }
        .field {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
        }
        input, textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-family: inherit;
        }
        .variable-group {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 15px;
        }
        button {
            background: linear-gradient(135deg, #006a4e, #f42a41);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
        }
        .preview {
            background: #f5f5f5;
            padding: 20px;
            border-radius: 12px;
            margin-top: 20px;
            max-height: 400px;
            overflow: auto;
        }
        .two-columns {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
        }
        @media (max-width: 768px) {
            .two-columns { grid-template-columns: 1fr; }
        }
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            padding: 12px 24px;
            border-radius: 30px;
            color: white;
            z-index: 1000;
        }
        .toast.success { background: #006a4e; }
        .toast.error { background: #f42a41; }
        .loading {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="loading" id="loading"><div class="spinner"></div><p style="color:white;">Sending...</p></div>

    <div class="container">
        <div class="card">
            <div class="logo"><h1>📧 QUICKMAIL</h1></div>
            <div class="badge">✨ Made by Hossain | Made in Bangladesh 🇧🇩</div>

            <div class="two-columns">
                <!-- Left: Templates -->
                <div>
                    <h3>🎨 Choose Template</h3>
                    <div id="templateGrid" class="template-grid"></div>
                </div>

                <!-- Right: Form -->
                <div>
                    <div class="field">
                        <label>🔑 License Key *</label>
                        <input type="text" id="license" placeholder="Enter license key">
                    </div>
                    <div class="field">
                        <label>👤 Your Name *</label>
                        <input type="text" id="name" placeholder="Hossain Mahmud">
                    </div>
                    <div class="field">
                        <label>📧 Your Email *</label>
                        <input type="email" id="from_email" placeholder="you@example.com">
                    </div>
                    <div class="field">
                        <label>🎯 Receiver Email *</label>
                        <input type="email" id="to_email" placeholder="friend@example.com">
                    </div>
                    <div class="field">
                        <label>📌 Subject *</label>
                        <input type="text" id="subject" placeholder="Email subject">
                    </div>
                    
                    <div id="variablesContainer"></div>
                    
                    <div class="preview" id="previewArea">
                        <strong>📱 Live Preview</strong>
                        <div id="previewContent">Select a template to see preview</div>
                    </div>
                    
                    <button id="sendBtn">✈️ Send Email</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let templates = {};
        let selectedTemplate = null;
        let variableValues = {};
        
        async function loadTemplates() {
            const res = await fetch('/api/templates');
            templates = await res.json();
            renderTemplates();
        }
        
        function renderTemplates() {
            const grid = document.getElementById('templateGrid');
            grid.innerHTML = '';
            for (const [category, items] of Object.entries(templates)) {
                for (const t of items) {
                    const card = document.createElement('div');
                    card.className = 'template-card';
                    card.onclick = () => selectTemplate(t);
                    card.innerHTML = `
                        <img src="${t.image}" onerror="this.src='https://via.placeholder.com/600x300/006a4e/white?text=Template'">
                        <div class="info">
                            <h4>${t.name}</h4>
                            <p>${t.title}</p>
                            <small style="color:#888;">${category}</small>
                        </div>
                    `;
                    grid.appendChild(card);
                }
            }
        }
        
        function selectTemplate(template) {
            selectedTemplate = template;
            document.querySelectorAll('.template-card').forEach(c => c.classList.remove('selected'));
            event.target.closest('.template-card').classList.add('selected');
            
            // Generate variable inputs
            const container = document.getElementById('variablesContainer');
            container.innerHTML = '<h3>✏️ Customize Content</h3>';
            variableValues = {};
            
            for (const varName of template.variables) {
                const div = document.createElement('div');
                div.className = 'variable-group';
                div.innerHTML = `
                    <label>${varName.replace(/_/g, ' ')}</label>
                    <input type="text" id="var_${varName}" placeholder="Enter ${varName.replace(/_/g, ' ')}" value="{{${varName}}}">
                `;
                container.appendChild(div);
                variableValues[varName] = `{{${varName}}}`;
                
                const input = div.querySelector('input');
                input.addEventListener('input', (e) => {
                    variableValues[varName] = e.target.value;
                    updatePreview();
                });
            }
            
            updatePreview();
        }
        
        function updatePreview() {
            if (!selectedTemplate) return;
            let html = selectedTemplate.html;
            for (const [key, value] of Object.entries(variableValues)) {
                const regex = new RegExp(`{{${key}}}`, 'g');
                html = html.replace(regex, value);
            }
            document.getElementById('previewContent').innerHTML = html;
        }
        
        function showToast(msg, type) {
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.innerText = msg;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 4000);
        }
        
        document.getElementById('sendBtn').addEventListener('click', async () => {
            const license = document.getElementById('license').value.trim();
            const name = document.getElementById('name').value.trim();
            const from_email = document.getElementById('from_email').value.trim();
            const to_email = document.getElementById('to_email').value.trim();
            const subject = document.getElementById('subject').value.trim();
            
            if (!license || !name || !from_email || !to_email || !subject || !selectedTemplate) {
                showToast('❌ Please fill all fields and select a template!', 'error');
                return;
            }
            
            let htmlContent = selectedTemplate.html;
            for (const [key, value] of Object.entries(variableValues)) {
                const regex = new RegExp(`{{${key}}}`, 'g');
                htmlContent = htmlContent.replace(regex, value);
            }
            
            document.getElementById('loading').style.display = 'flex';
            
            try {
                const res = await fetch('/api/send', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ license, name, from_email, to_email, subject, message: htmlContent })
                });
                const result = await res.json();
                document.getElementById('loading').style.display = 'none';
                if (result.success) {
                    showToast(result.message, 'success');
                } else {
                    showToast(result.error, 'error');
                }
            } catch (error) {
                document.getElementById('loading').style.display = 'none';
                showToast('Network error!', 'error');
            }
        });
        
        loadTemplates();
    </script>
</body>
</html>
