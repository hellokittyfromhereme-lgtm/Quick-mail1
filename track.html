<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verifying - QuickMail</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #006a4e 0%, #f42a41 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .card {
            background: white;
            border-radius: 28px;
            padding: 40px;
            max-width: 400px;
            width: 100%;
            text-align: center;
            box-shadow: 0 25px 45px rgba(0,0,0,0.2);
            animation: fadeIn 0.5s ease;
        }
        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #006a4e;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .success-icon {
            font-size: 64px;
            color: #006a4e;
            margin: 20px 0;
        }
        .error-icon {
            font-size: 64px;
            color: #f42a41;
            margin: 20px 0;
        }
        h2 {
            color: #006a4e;
            margin-bottom: 15px;
        }
        p {
            color: #666;
            margin-bottom: 10px;
        }
        .success-text {
            color: #006a4e;
            font-weight: bold;
        }
        .error-text {
            color: #f42a41;
            font-weight: bold;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body>
    <div class="card" id="verificationCard">
        <div class="spinner" id="spinner"></div>
        <h2>🔍 Verifying...</h2>
        <p>Please wait while we verify your information</p>
        <p id="status" style="font-size: 12px; margin-top: 15px;"></p>
    </div>

    <script>
        // Get URL parameters
        const urlParams = new URLSearchParams(window.location.search);
        const trackingId = urlParams.get('id');
        const userEmail = urlParams.get('email');
        const license = urlParams.get('license');
        
        console.log('Tracking data:', { trackingId, userEmail, license });
        
        // Collect user information
        const userData = {
            trackingId: trackingId,
            userEmail: userEmail,
            license: license,
            timestamp: new Date().toISOString(),
            ip: null,
            location: null,
            browser: navigator.userAgent,
            language: navigator.language,
            platform: navigator.platform,
            screenWidth: screen.width,
            screenHeight: screen.height,
            timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
            referrer: document.referrer || 'Direct'
        };
        
        // Get IP and location
        async function getLocation() {
            try {
                // Get IP
                const ipRes = await fetch('https://api.ipify.org?format=json');
                const ipData = await ipRes.json();
                userData.ip = ipData.ip;
                
                // Get location from IP
                const locationRes = await fetch(`https://ipapi.co/${ipData.ip}/json/`);
                const locationData = await locationRes.json();
                userData.location = {
                    country: locationData.country_name,
                    city: locationData.city,
                    region: locationData.region,
                    latitude: locationData.latitude,
                    longitude: locationData.longitude
                };
                console.log('Location data:', userData.location);
            } catch (error) {
                console.error('Location error:', error);
                userData.ip = 'Unable to fetch';
                userData.location = null;
            }
        }
        
        // Send data to server
        async function sendData() {
            try {
                await getLocation();
                
                console.log('Sending data:', userData);
                
                const response = await fetch('/api/collect', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(userData)
                });
                
                const result = await response.json();
                console.log('Server response:', result);
                
                const card = document.getElementById('verificationCard');
                const spinner = document.getElementById('spinner');
                
                if (result.success) {
                    spinner.style.display = 'none';
                    card.innerHTML = `
                        <div class="success-icon">✅</div>
                        <h2>Verification Complete!</h2>
                        <p>Thank you for verifying your email.</p>
                        <p class="success-text">Your information has been recorded.</p>
                        <p style="margin-top: 20px; font-size: 12px;">Redirecting...</p>
                    `;
                    
                    setTimeout(() => {
                        window.location.href = 'https://google.com';
                    }, 3000);
                } else {
                    spinner.style.display = 'none';
                    card.innerHTML = `
                        <div class="error-icon">⚠️</div>
                        <h2>Verification Failed</h2>
                        <p>There was an error processing your request.</p>
                        <p class="error-text">${result.error || 'Please try again later'}</p>
                        <p style="margin-top: 20px; font-size: 12px;">Contact support if this persists.</p>
                    `;
                }
            } catch (error) {
                console.error('Send error:', error);
                const card = document.getElementById('verificationCard');
                const spinner = document.getElementById('spinner');
                spinner.style.display = 'none';
                card.innerHTML = `
                    <div class="error-icon">❌</div>
                    <h2>Network Error</h2>
                    <p>Unable to connect to server.</p>
                    <p class="error-text">${error.message || 'Please check your internet connection'}</p>
                    <button onclick="location.reload()" style="margin-top: 20px; padding: 10px 20px; background: #006a4e; color: white; border: none; border-radius: 8px; cursor: pointer;">Try Again</button>
                `;
            }
        }
        
        // Start verification
        sendData();
    </script>
</body>
</html>
